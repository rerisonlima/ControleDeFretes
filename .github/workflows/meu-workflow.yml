name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite rodar manualmente.

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

        - name: Install PostgreSQL Client 17
        run: |
          # Adiciona o repositório oficial do PostgreSQL
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          # Importa a chave de autenticação do repositório
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          # Atualiza a lista e instala a versão 17
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run backup
        run: |
          # Remove parâmetros como ?pgbouncer=true da URL antes de rodar.
          CLEAN_URL=$(echo "${{ secrets.SUPABASE_DB_URL }}" | cut -d'?' -f1)
          /usr/lib/postgresql/17/bin/pg_dump "$CLEAN_URL" -F c -f backup.dump
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }} # Caso sua URL não tenha a senha embutida

      - name: Upload Backup Artifact
        uses: actions/setup-node@v4 # Exemplo de passo extra para salvar o arquivo
        with:
          node-version: '20'
      
      - name: Save file
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup
          path: backup.dump
