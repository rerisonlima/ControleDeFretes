name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

    - name: Install PostgreSQL Client 17
        run: |
          # 1. Instalar dependências básicas.
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg
          
          # 2. Adicionar a chave GPG do PostgreSQL no formato moderno (.gpg)
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg --fail https://www.postgresql.org
          
          # 3. Adicionar o repositório apontando para a chave baixada
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] http://apt.postgresql.org $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          
          # 4. Atualizar e instalar a versão 17
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run backup
        run: |
          CLEAN_URL=$(echo "${{ secrets.SUPABASE_DB_URL }}" | cut -d'?' -f1)
          /usr/lib/postgresql/17/bin/pg_dump "$CLEAN_URL" -F c -f backup.dump

      - name: Save Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup
          path: backup.dump
