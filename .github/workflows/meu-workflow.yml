name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run backup via Docker
        run: |
          CLEAN_URL=$(echo "${{ secrets.SUPABASE_DB_URL }}" | cut -d'?' -f1)
          docker run --rm -v $(pwd):/backup postgres:17 pg_dump "$CLEAN_URL" -F c -f /backup/backup.dump

      - name: Save Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup
          path: backup.dump
